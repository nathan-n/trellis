<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Trellis OG image — Direction C.
       D3 gradient (cream-green → plum) with dark ink, Fan C mark, Fraunces wordmark. -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4E8D1"/>
      <stop offset="55%" stop-color="#A99BC5"/>
      <stop offset="100%" stop-color="#7C6F9B"/>
    </linearGradient>
    <!-- Warm-brown dot overlay at ~6% opacity (light gradient takes brown dots, not white) -->
    <pattern id="dots" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.2" fill="#3C3228" opacity="0.28"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.22"/>

  <!-- Fan C mark (cream disc) -->
  <g transform="translate(96 96) scale(2.1)">
    <circle cx="32" cy="32" r="28" fill="#F3EFEB"/>
    <g stroke="#524470" stroke-width="2" stroke-linecap="round" opacity="0.55" fill="none">
      <line x1="32" y1="52" x2="16" y2="24"/>
      <line x1="32" y1="52" x2="24" y2="16"/>
      <line x1="32" y1="52" x2="32" y2="14"/>
      <line x1="32" y1="52" x2="40" y2="16"/>
      <line x1="32" y1="52" x2="48" y2="24"/>
    </g>
    <path d="M18 32 Q32 28 46 32" stroke="#524470" stroke-width="1.3" opacity="0.3" fill="none"/>
    <path d="M26 50 C 22 42, 32 36, 28 28 C 24 22, 32 18, 34 14" stroke="#3A7D44" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <ellipse cx="22" cy="38" rx="2.8" ry="1.7" fill="#6DB97B" transform="rotate(-50 22 38)"/>
    <ellipse cx="34" cy="22" rx="2.8" ry="1.7" fill="#6DB97B" transform="rotate(60 34 22)"/>
  </g>

  <!-- Wordmark -->
  <text x="96" y="330" font-family="Fraunces, Georgia, serif" font-style="italic" font-weight="500" font-size="96" fill="#1F1B16" letter-spacing="-2">Trellis</text>

  <!-- Tagline -->
  <text x="96" y="400" font-family="'Instrument Sans', Arial, sans-serif" font-weight="500" font-size="36" fill="#1F1B16">Caregiving, coordinated.</text>

  <!-- Description -->
  <text x="96" y="458" font-family="'Instrument Sans', Arial, sans-serif" font-weight="400" font-size="22" fill="#1F1B16" opacity="0.78">Coordinate tasks, visits, medications, and daily care</text>
  <text x="96" y="491" font-family="'Instrument Sans', Arial, sans-serif" font-weight="400" font-size="22" fill="#1F1B16" opacity="0.78">for loved ones with Alzheimer's — together.</text>

  <!-- Footer URL — mono -->
  <text x="96" y="580" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16" fill="#1F1B16" opacity="0.5" letter-spacing="2">trellis.necaise.co</text>
</svg>
